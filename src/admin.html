<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Buffy Braveart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header class="page-header">
    <h1 class="page-header__title">Admin</h1>
    <p class="page-header__subtitle">Manage your artwork</p>
    <nav class="page-header__nav">
      <a href="/" class="btn btn--small">Home</a>
      <a href="/gallery" class="btn btn--small">Gallery</a>
    </nav>
  </header>

  <div class="admin">
    <div id="status"></div>

    <div class="admin__form">
      <h2>Add New Artwork</h2>
      <form id="uploadForm">
        <div class="form-group">
          <label for="artName">Artwork Name</label>
          <input type="text" id="artName" name="name" required>
        </div>
        <div class="form-group">
          <label for="artPrice">Price (&pound;)</label>
          <input type="number" id="artPrice" name="price" min="0.01" step="0.01" required>
        </div>
        <div class="form-group">
          <label for="artImage">Image</label>
          <input type="file" id="artImage" name="image" accept="image/*" required>
        </div>
        <button type="submit" class="btn btn--filled">Upload Artwork</button>
      </form>
    </div>

    <h2 style="font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; font-size: 1.2rem; margin-bottom: 1.5rem;">Existing Artwork</h2>
    <div class="gallery" id="adminGallery" style="margin: 0 0 3rem; padding: 0;">
      <div class="loading" id="loading">Loading&hellip;</div>
    </div>
  </div>

  <footer class="footer">
    &copy; 2026 Buffy Braveart Gallery
  </footer>

  <script src="/js/admin.js"></script>
</body>
</html>
