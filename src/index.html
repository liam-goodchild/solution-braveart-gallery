<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buffy Braveart Gallery</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <section class="hero">
    <div class="hero__bg" id="heroBg"></div>
    <div class="hero__overlay"></div>
    <div class="hero__content">
      <h1 class="hero__title">Buffy Braveart Gallery</h1>
      <p class="hero__note" id="artistNote">
        Welcome to my gallery. Each piece is a fragment of imagination, rendered in light and colour.
      </p>
      <div class="hero__actions">
        <a href="/gallery" class="btn btn--filled">View Gallery</a>
        <button class="btn" id="contactBtn" type="button">Contact</button>
      </div>
    </div>
  </section>

  <!-- Contact Modal -->
  <div class="modal-backdrop" id="contactModal">
    <div class="modal">
      <h2 class="modal__title">Get in Touch</h2>
      <div class="modal__item">
        <span>Email</span>
        <a href="mailto:hello@buffybraveart.com">hello@buffybraveart.com</a>
      </div>
      <div class="modal__item">
        <span>Phone</span>
        <a href="tel:+441234567890">+44 1234 567890</a>
      </div>
      <button class="btn btn--small modal__close" id="closeModal" type="button">Close</button>
    </div>
  </div>

  <script src="/js/home.js"></script>
</body>
</html>
