<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buffy Braveart Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="canvas-texture" aria-hidden="true"></div>
  <div class="viewport-frame" aria-hidden="true"></div>

  <section class="hero">
    <div class="hero__bg" id="heroBg"></div>
    <div class="hero__overlay"></div>

    <div class="hero__corner hero__corner--tl" aria-hidden="true"></div>
    <div class="hero__corner hero__corner--tr" aria-hidden="true"></div>
    <div class="hero__corner hero__corner--bl" aria-hidden="true"></div>
    <div class="hero__corner hero__corner--br" aria-hidden="true"></div>

    <div class="hero__content">
      <p class="hero__crest">Est. mmxxvi</p>
      <h1 class="hero__title">
        Buffy
        <span>Braveart Gallery</span>
      </h1>
      <div class="ornament" aria-hidden="true">&#9830;</div>
      <p class="hero__note" id="artistNote">
        Each piece is a fragment of imagination, rendered in light
        and colour &mdash; collected here for those who see beyond the frame.
      </p>
      <div class="hero__actions">
        <a href="/gallery" class="btn btn--filled">Enter the Collection</a>
        <button class="btn" id="contactBtn" type="button">Enquiries</button>
      </div>
    </div>
  </section>

  <!-- Contact Modal -->
  <div class="modal-backdrop" id="contactModal">
    <div class="modal">
      <h2 class="modal__title">Enquiries</h2>
      <div class="modal__item">
        <span>Correspondence</span>
        <a href="mailto:braveartbuffy@gmail.com">braveartbuffy@gmail.com</a>
      </div>
      <div class="modal__item">
        <span>Telephone</span>
        <a href="tel:+270769498434">+27 076 949 8434</a>
      </div>
      <button class="btn btn--small modal__close" id="closeModal" type="button">Close</button>
    </div>
  </div>

  <footer class="footer footer--floating">
    &copy; 2026 Buffy Braveart Gallery
  </footer>

  <script src="/js/home.js"></script>
</body>
</html>
