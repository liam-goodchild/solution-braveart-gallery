trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/*

pool:
  vmImage: ubuntu-latest

variables:
  - group: braveart-prd

stages:
  - stage: Plan
    displayName: Terraform Plan
    jobs:
      - job: Plan
        displayName: Plan
        steps:
          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: latest

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init
              workingDirectory: $(System.DefaultWorkingDirectory)/infra
              backendServiceArm: $(serviceConnection)
              backendAzureRmResourceGroupName: rg-terrastate-prd-uks-01
              backendAzureRmStorageAccountName: stterrastateprduks01
              backendAzureRmContainerName: solution-buffybraveart-gallery
              backendAzureRmKey: terraform.tfstate

          - task: TerraformTaskV4@4
            displayName: Terraform Plan
            inputs:
              provider: azurerm
              command: plan
              workingDirectory: $(System.DefaultWorkingDirectory)/infra
              commandOptions: -out=tfplan
              environmentServiceNameAzureRM: $(serviceConnection)

          - publish: $(System.DefaultWorkingDirectory)/infra/tfplan
            artifact: tfplan
            displayName: Publish Plan Artifact

  - stage: Apply
    displayName: Terraform Apply
    dependsOn: Plan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: Apply
        displayName: Apply
        environment: braveart-prd
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: Install Terraform
                  inputs:
                    terraformVersion: latest

                - task: TerraformTaskV4@4
                  displayName: Terraform Init
                  inputs:
                    provider: azurerm
                    command: init
                    workingDirectory: $(System.DefaultWorkingDirectory)/infra
                    backendServiceArm: $(serviceConnection)
                    backendAzureRmResourceGroupName: rg-terrastate-prd-uks-01
                    backendAzureRmStorageAccountName: stterrastateprduks01
                    backendAzureRmContainerName: solution-buffybraveart-gallery
                    backendAzureRmKey: terraform.tfstate

                - download: current
                  artifact: tfplan
                  displayName: Download Plan Artifact

                - task: TerraformTaskV4@4
                  displayName: Terraform Apply
                  inputs:
                    provider: azurerm
                    command: apply
                    workingDirectory: $(System.DefaultWorkingDirectory)/infra
                    commandOptions: $(Pipeline.Workspace)/tfplan
                    environmentServiceNameAzureRM: $(serviceConnection)
