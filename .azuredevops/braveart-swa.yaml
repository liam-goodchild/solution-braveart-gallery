name: braveart-swa

trigger: none
pr: none

resources:
  repositories:
    - repository: templates
      type: github
      name: liam-goodchild/pipeline-engineering-templates
      endpoint: liam-goodchild
      ref: refs/heads/main

pool:
  vmImage: ubuntu-latest

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: Dev
    values: [Dev, Prd]

variables:
  - name: serviceConnectionName
    value: sc-customer
  - name: keyVaultName
    value: kv-braveart-${{ lower(parameters.environment) }}-uks-01

stages:
  # Stage 1: Build
  - stage: Build
    displayName: 'Build'
    jobs:
      - job: Build
        displayName: 'Build API'
        steps:
          - task: NodeTool@0
            displayName: 'Use Node.js 20'
            inputs:
              versionSpec: 20.x

          - script: npm ci
            displayName: 'Install API Dependencies'
            workingDirectory: $(System.DefaultWorkingDirectory)/functions

          - publish: $(System.DefaultWorkingDirectory)/frontend
            artifact: frontend
            displayName: 'Publish Frontend'

          - publish: $(System.DefaultWorkingDirectory)/functions
            artifact: functions
            displayName: 'Publish Functions'

  # Stage 2: Deploy
  - stage: Deploy
    displayName: 'Deploy to SWA (${{ parameters.environment }})'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: Deploy
        displayName: 'Deploy'
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download Frontend'
            inputs:
              artifact: frontend
              targetPath: $(System.DefaultWorkingDirectory)/frontend

          - task: DownloadPipelineArtifact@2
            displayName: 'Download Functions'
            inputs:
              artifact: functions
              targetPath: $(System.DefaultWorkingDirectory)/functions

          - task: AzureKeyVault@2
            displayName: 'Fetch Secrets from Key Vault'
            inputs:
              azureSubscription: $(serviceConnectionName)
              KeyVaultName: $(keyVaultName)
              SecretsFilter: 'swa-deployment-token,storage-connection-string,storage-account-name,storage-account-key,stripe-secret-key'
              RunAsPreJob: false

          - task: AzureStaticWebApp@0
            displayName: 'Deploy Static Web App'
            inputs:
              app_location: $(System.DefaultWorkingDirectory)/frontend
              api_location: $(System.DefaultWorkingDirectory)/functions
              skip_app_build: true
              skip_api_build: true
            env:
              azure_static_web_apps_api_token: $(swa-deployment-token)

          - task: AzureCLI@2
            displayName: 'Sync App Settings to SWA'
            inputs:
              azureSubscription: $(serviceConnectionName)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                SWA_NAME="stapp-braveart-${{ lower(parameters.environment) }}-uks-01"
                RG_NAME="rg-braveart-${{ lower(parameters.environment) }}-uks-01"

                az staticwebapp appsettings set \
                  --name $SWA_NAME \
                  --resource-group $RG_NAME \
                  --setting-names \
                    "STORAGE_CONNECTION_STRING=$(storage-connection-string)" \
                    "STORAGE_ACCOUNT_NAME=$(storage-account-name)" \
                    "STORAGE_ACCOUNT_KEY=$(storage-account-key)" \
                    "STRIPE_SECRET_KEY=$(stripe-secret-key)" \
                    "FRONTEND_URL=https://$(az staticwebapp show --name $SWA_NAME --resource-group $RG_NAME --query defaultHostname -o tsv)"
