name: braveart-swa

trigger: none
pr: none

resources:
  repositories:
    - repository: templates
      type: github
      name: liam-goodchild/pipeline-engineering-templates
      endpoint: liam-goodchild
      ref: refs/heads/main

pool:
  vmImage: ubuntu-latest

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: Dev
    values: [Dev, Prd]

variables:
  - name: serviceConnectionName
    value: sc-customer
  - group: braveart-secrets

stages:
  - stage: Deploy
    displayName: 'Deploy to SWA (${{ parameters.environment }})'
    jobs:
      - job: Deploy
        displayName: 'Deploy'
        steps:
          - checkout: self

          - task: UseNode@1
            displayName: 'Use Node.js 20'
            inputs:
              version: 20.x

          - script: npm ci
            displayName: 'Install API Dependencies'
            workingDirectory: $(System.DefaultWorkingDirectory)/functions

          - task: AzureCLI@2
            displayName: 'Fetch SWA Deployment Token'
            inputs:
              azureSubscription: $(serviceConnectionName)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                SWA_NAME="stapp-braveart-${{ lower(parameters.environment) }}-uks-01"
                RG_NAME="rg-braveart-${{ lower(parameters.environment) }}-uks-01"

                TOKEN=$(az staticwebapp secrets list \
                  --name $SWA_NAME \
                  --resource-group $RG_NAME \
                  --query "properties.apiKey" -o tsv)

                echo "##vso[task.setvariable variable=swaDeploymentToken;issecret=true]$TOKEN"

          - task: AzureStaticWebApp@0
            displayName: 'Deploy Static Web App'
            inputs:
              app_location: frontend
              api_location: functions
              output_location: ''
              azure_static_web_apps_api_token: $(swaDeploymentToken)
