name: braveart-infra

trigger: none
pr: none

resources:
  repositories:
    - repository: templates
      type: github
      name: liam-goodchild/pipeline-engineering-templates
      endpoint: liam-goodchild
      ref: refs/heads/main

pool:
  vmImage: ubuntu-latest

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: Dev
    values: [Dev, Prd]
  - name: terraformAction
    displayName: Terraform Action
    type: string
    default: Plan
    values: [Plan, Apply, Destroy]

variables:
  - name: serviceConnectionName
    value: sc-customer
  - name: backendContainerName
    value: solution-buffybraveart-gallery
  - name: globalTfvars
    value: infra/vars/globals.tfvars
  - name: tfvars
    value: infra/vars/${{ lower(parameters.environment) }}.tfvars
  - name: backendResourceGroupName
    value: rg-tfs-platform-${{ lower(parameters.environment) }}-uks-01
  - name: backendStorageAccountName
    value: sttfsplatform${{ lower(parameters.environment) }}uks01
  - group: braveart-secrets

stages:
  - stage: Terraform
    displayName: 'Terraform ${{ parameters.terraformAction }} (${{ parameters.environment }})'
    jobs:
      - job: TerraformAction
        displayName: 'Terraform ${{ parameters.terraformAction }}'
        variables:
          - name: TF_VAR_stripe_secret_key
            value: $(TF_VAR_stripe_secret_key)
        steps:
          - checkout: self
          - template: terraform/action.yaml@templates
            parameters:
              terraformAction: ${{ lower(parameters.terraformAction) }}
              serviceConnectionName: $(serviceConnectionName)
              backendResourceGroupName: $(backendResourceGroupName)
              backendStorageAccountName: $(backendStorageAccountName)
              backendContainerName: $(backendContainerName)
              backendKey: terraform.tfstate
              envTfvars: $(tfvars)
              globalTfvars: $(globalTfvars)
              whitelistAgentIp: false
              ensureBackendContainer: false