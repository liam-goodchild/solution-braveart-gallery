name: Terraform Documentation

on:
  workflow_call:
    inputs:
      terraform-docs-version:
        description: 'terraform-docs version'
        type: string
        default: '0.20.0'
      terraform-dir:
        description: 'Directory containing Terraform files to document'
        type: string
        default: '.'
      target-branch:
        description: 'Branch to commit documentation changes to'
        type: string
        default: ''
      commit-message:
        description: 'Commit message for documentation changes'
        type: string
        default: 'Automated documentation update [skip ci]'

permissions:
  contents: write

jobs:
  docs:
    name: Generate Terraform Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.target-branch || github.ref_name }}

      - name: Generate Terraform Docs
        run: |
          docker run --rm \
            --volume "$(pwd):/terraform-docs" \
            -u "$(id -u)" \
            "quay.io/terraform-docs/terraform-docs:${{ inputs.terraform-docs-version }}" \
            markdown \
            --config /terraform-docs/.terraform-docs.yml \
            "/terraform-docs/${{ inputs.terraform-dir }}"

      - name: Commit and Push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "${{ inputs.commit-message }}"
            git push
            echo "::notice::Documentation changes pushed."
          else
            echo "::notice::No documentation changes to push."
          fi
