name: braveart-infra

on:
  push:
    branches: ['feature/**']
    paths: ['infra/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        required: true
        default: prd
        options: [prd]
      terraform-action:
        description: 'Terraform action to perform'
        type: choice
        required: true
        default: plan
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: ${{ inputs.environment || 'prd' }}
  TERRAFORM_ACTION: ${{ inputs.terraform-action || 'plan' }}
  TF_VERSION: '1.14.8'
  BACKEND_SUBSCRIPTION_ID: cefc8742-e1dd-4b24-90a9-07e3d3c80d88

jobs:
  terraform:
    name: 'Terraform ${{ inputs.terraform-action || ''plan'' }}'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'prd' }}
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-tfs-platform-${{ env.ENVIRONMENT }}-uks-01" \
            -backend-config="storage_account_name=sttfsplatform${{ env.ENVIRONMENT }}uks01" \
            -backend-config="container_name=${{ github.event.repository.name }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="subscription_id=${{ env.BACKEND_SUBSCRIPTION_ID }}"
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Plan
        if: env.TERRAFORM_ACTION == 'plan'
        run: |
          terraform plan \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${{ env.ENVIRONMENT }}.tfvars"
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Apply
        if: env.TERRAFORM_ACTION == 'apply'
        run: |
          terraform apply \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${{ env.ENVIRONMENT }}.tfvars" \
            -auto-approve
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Destroy
        if: env.TERRAFORM_ACTION == 'destroy'
        run: |
          terraform destroy \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${{ env.ENVIRONMENT }}.tfvars" \
            -auto-approve
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Break Terraform State Lease
        if: always()
        uses: ./.github/actions/break-lease
        with:
          storage-account-name: sttfsplatform${{ env.ENVIRONMENT }}uks01
          container-name: ${{ github.event.repository.name }}
          blob-key: terraform.tfstate
          subscription-id: ${{ env.BACKEND_SUBSCRIPTION_ID }}
