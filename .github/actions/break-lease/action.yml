name: 'Break Terraform State Lease'
description: 'Break the lease on a Terraform state blob in Azure Storage'

inputs:
  storage-account-name:
    description: 'Azure Storage Account name'
    required: true
  container-name:
    description: 'Backend container name'
    required: true
  blob-key:
    description: 'State blob name (e.g. terraform.tfstate)'
    required: true
  subscription-id:
    description: 'Azure subscription ID for the backend storage account'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Break Terraform State Lease
      shell: bash
      run: |
        storage_account="${{ inputs.storage-account-name }}"
        container_name="${{ inputs.container-name }}"
        blob_name="${{ inputs.blob-key }}"
        subscription_id="${{ inputs.subscription-id }}"

        if [[ -n "$subscription_id" ]]; then
          echo "::notice::Switching to backend subscription: $subscription_id"
          az account set --subscription "$subscription_id"
        fi

        echo "Attempting to break lease on '$blob_name' in container '$container_name'..."

        lease_state=$(az storage blob show \
          --name "$blob_name" \
          --container-name "$container_name" \
          --account-name "$storage_account" \
          --query "properties.lease.state" \
          --output tsv 2>/dev/null) || true

        if [[ -z "$lease_state" ]]; then
          echo "::notice::State blob '$blob_name' not found or inaccessible; skipping lease break."
          exit 0
        fi

        if [[ "$lease_state" == "leased" ]]; then
          az storage blob lease break \
            --blob-name "$blob_name" \
            --container-name "$container_name" \
            --account-name "$storage_account" \
            --only-show-errors
          echo "::notice::Lease broken successfully."
        else
          echo "::notice::No active lease to break (state: $lease_state)."
        fi
