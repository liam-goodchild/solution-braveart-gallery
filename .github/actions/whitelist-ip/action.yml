name: 'Whitelist Agent IP on Storage Firewall'
description: 'Add or remove the runner IP from an Azure Storage Account firewall'

inputs:
  storage-account-name:
    description: 'Azure Storage Account name'
    required: true
  resource-group-name:
    description: 'Resource group containing the Storage Account'
    required: true
  action:
    description: 'Action to perform (add or remove)'
    required: true
  subscription-id:
    description: 'Azure subscription ID for the backend storage account'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: '${{ inputs.action }} Agent IP on Storage Firewall'
      shell: bash
      run: |
        action="${{ inputs.action }}"
        storage_account="${{ inputs.storage-account-name }}"
        resource_group="${{ inputs.resource-group-name }}"
        subscription_id="${{ inputs.subscription-id }}"

        if [[ -n "$subscription_id" ]]; then
          echo "::notice::Switching to backend subscription: $subscription_id"
          az account set --subscription "$subscription_id"
        fi

        agent_ip=$(curl -s https://api.ipify.org)
        echo "::notice::Agent IP: $agent_ip"

        if [[ "$action" == "add" ]]; then
          echo "Enabling public network access on storage account '$storage_account'..."
          az storage account update \
            --name "$storage_account" \
            --resource-group "$resource_group" \
            --public-network-access Enabled \
            --default-action Deny \
            --output none

          echo "Adding $agent_ip to storage account '$storage_account' firewall..."
          az storage account network-rule add \
            --account-name "$storage_account" \
            --resource-group "$resource_group" \
            --ip-address "$agent_ip" \
            --output none
          echo "::notice::IP $agent_ip added successfully."

          echo "Waiting for firewall rule to propagate..."
          sleep 30

        elif [[ "$action" == "remove" ]]; then
          echo "Removing $agent_ip from storage account '$storage_account' firewall..."
          az storage account network-rule remove \
            --account-name "$storage_account" \
            --resource-group "$resource_group" \
            --ip-address "$agent_ip" \
            --output none
          echo "::notice::IP $agent_ip removed successfully."

          echo "Disabling public network access on storage account '$storage_account'..."
          az storage account update \
            --name "$storage_account" \
            --resource-group "$resource_group" \
            --public-network-access Disabled \
            --output none
          echo "::notice::Public network access disabled."
        fi
